body:
  text: 海語卷上明黃衷撰風俗暹羅按暹羅國乃暹與羅斛二國在占城南暹羅國在南海中自東管之南亭門放洋南至烏瀦獨瀦七洲三洋名星􅌉坤未針海天無際舶行莫知方位惟以星􅌉針定子午而赴之至外羅坤申針四十五程至占城本古越裳氏之界舊港經大佛靈山其上烽墩則交趾即安南屬也又未針至昆山又坤未針至玳瑁洲玳瑁額及於龜山酉針入暹羅港水中長洲隱隆如壩舶出入如中國車壩然亦國之一控扼也少進為一關守以夷酋又少進為二關即國都也其地沮洳無城郭王居據大嶼稍如中國殿宇之制覆以錫版闢東壁為巨扉是為王門治內分十二塘壩酋長主焉猶華之有衙府也其要害為龜山為陸昆主以阿昆猛齋猶華言總兵甲兵屬焉有奶街為華人流寓者之居土夷乃散處水棚板閣蔭以茭草無陶瓦也其國右僧謂僧作佛佛乃作王其貴僧亦稱僧王國有號令決焉凡國人謁王必合掌跽而捫王之足者三自捫其首者三謂之頂禮敬之至也凡王子始長習梵字梵禮若術數之類皆從貴僧是故貴僧之權侔於王也國無姓氏華人流寓者始從本姓一再傳亦亡矣人皆髠首耻為盜竊凡犯盜及私市者罪之其犴獄則穴地為重樓三級謂之三牢輕罪置上級差重置中級殊死者乃置下級輕刑以皮鞭差重斷足十趾差重斷手十指罪至殊死者腰斬或以象蹂之貴僧為請於王王乃宥之沒為僧奴謂之奴囝賦役省薄惟給象為最重故殊死獲免者不為奴囝則以給象終身焉國無占候凡日薄蝕國人見者則奔告於王首至者賞建寅之月王乃命巫占方命力者由勝方所向掠人而剔其膽雜諸藥為湯王濡足象濡首以作猛氣凡用膽華人為上僧不剔孕婦不剔瘡痏不剔是故用膽視嵗甲子為多寡也建辰之月是為嵗首建巳之月始作農事建午之月潦始漲建酉之月潦退王乃御龍舟乃祀土榖禾乃登始穫凡稼之長茂視潦之淺深稈長丈有三尺穟八寸有只稻三盈寸田畝贍數口少歉嵗也凡男女先私媾而後聘婚既嫁而外私者犯則出貨以贖然猶蔽罪於男謂其為亂首也凡婦多慧巧刺繡織絍工於中國尤善醖釀故暹酒甲於諸夷婦飾必以諸香澤其體髮日夕三四浴戲押不禁雖王之妻妾皆盛飾倚市與漢兒貿易不訝亦不敢亂居父母若夫之喪則削髮如比丘尼經旬乃蓄鬒如舊凡死喪富夷火尸而葬貧者舉尸筏而浮諸海喪屬跽伏於海濱迎僧而呪羣大鳥啄而食之頃之而盡謂之鳥葬凡鰐患夷衆則奔赴於王王詔貴僧呪飯而投諸鰐所乃以貝多葉書數符佩以奴囝沒水牽數鰐出貴僧稽其孽迹多者戮之刳其腹有得鉛珠二升者迹少乃黥符其背呪而縱之國人凡有讐怨皆謁僧求呪其呪土夷遭者非死即疾苦施諸華人則不能害也尺飯僧必具十品食也屑糯若粳也牛也羊也豕也翰音也舒鴈也家鶩若魚也皆熟而薦之僧呪而後舉舉必盡數器不足十品不以供也其産多蘇方木檳榔椰子波羅蜜片腦諸香雜果象齒犀角金寶玳瑁之屬貿易用􅚔故其民饒富豪酋各據别島而居奴囝數百口蓄資多至數十巨萬不蓋藏不虞冦西洋諸國異産竒貨輻輳其地匠藝工緻嵌寶指環時至中國一枚值數十金地廣而兵強嘗併有占臘本扶南屬國而私其貢賦以不繫中國利害置不問也洪武四年暹羅國王參烈昭毗牙遣使臣奈思俚儕剌識悉替等來朝貢進金葉表其物有象牙有犀角孔雀尾翠羽龜筒六足龜寶石珊瑚金界指片腦米腦腦油腦柴檀香速香安息香黃熟香降真香羅斛香乳香樹香木香丁香阿魏薔薇水丁皮琬石紫梗藤竭藤黃硫黃沒藥烏爹泥肉豆蔲胡椒白豆䓻蓽茇蘇木烏木大楓子苾布油紅布白纒頭布紅撒哈剌布紅地絞節知布暗花紅細棋子花布織人象花文打布西洋布織花紅絲打布剪絨絲雜色紅花被面織雜色紅文絲縵使回令於廣東布政司管待滿剌加按滿剌加國在占城南前代不通中國滿剌加在南海中始為暹羅屬域厥後守土酋長判其主而自立開國無可考矣自東管縣南亭門放洋星盤與暹羅同道至昆洋直子午收龍牙門港二日程至其國為諸夷輻輳之地亦海上一小都會也王居前屋用瓦乃永樂中太監鄭和所遣者餘屋皆僣擬殿宇以錫箔為飾遇制使若列國互市王即盛陳儀衛以自警備其民皆土室而居其尊官稱姑郎伽巨室稱南和達民多饒裕南和達一家胡椒有至數千斛象牙犀角西洋布珠具香品若他止蓄無算俗不尚鬼男子雞鳴而起仰天呦呦而呼哈喇蓋哈喇者天地父母之通謂也文字皆𣑽書貿易以錫行大都錫三斤當銀一錢耳牙儈交易搦指節以示數千金貿易不立文字指天為約卒母敢負者不産五榖米稻皆暹羅崛巄陂隄里所貨鬻俗禁食豕肉華人流寓或有食者輒惡之謂厭其穢也其地多酥酪富夷以和飯而啖雞犬鵝鶩常仰販於他國故一物之價五倍於華也民性獷暴而重然諾耙鑞刃類也不離頃刻生男二嵗即造小耙鑞而佩之一語不合便剸刃其胸死即刃者輒逃匿山谷踰時乃出死者之家不復尋讐姑郎伽亦不復追論矣交會則交捫其心以為禮誤捫其手則勃然忿爭貧民頗事剽掠遇獨客輒殺而奪其資舶商假館主者必遣女奴以服役猶日夕饋食飲少不知戒即腰纒皆為所掩取矣婚嫁尤論財男聘以十四而責女之奩資嘗數倍陪送奴囝有五六房者市井罵詈止於其身雖甚辱不大較若罵子孫而及父祖罵奴而及家長輒以死鬬故傭奴以土著為上謂其能扞主也婦女以夜為市禁以二鼓為罷脫有過禁者遇巡徼姑郎伽即執而戮之王亦不詰也輕刑鞭撻罪至死者斷木為髙樁而鋭其末入土二尺許以囚大孔貫鋭端輾轉哀噭頃之洞腹而死喪事貧者舉尸而焚冨人則以樟腦實棺中而後焚之詰旦而視骨為揚灰矣其地多崇山大谷陸行可達暹羅嘗併有瓜哇之國本婆古闍國然瓜哇之夷素號凶狡凡受傭其地而戕害其主者十八九惟善制藥筒中其矢者無不立死正德間佛郎機佛郎機不知何種素不通中國正德丁丑假作貢獻來至近廣恃火鋭設柵自固虜嬰兒烹食之守臣率來軍攻殺之遁去之舶互市爭利而閧夷王執其哪噠而囚之佛郎機人歸訴於其主議必報之乃治大舶八艘精兵及萬乘風突至時已逾年國中少備大被殺掠佛郎機夷酋進據其宫滿剌加王退依陂隄里老幼存者復多散逸佛郎機將以其地索賂於暹羅而歸之暹羅辭焉佛郎機整衆滿載而去王乃復所永樂三年滿剌加國王西剌八兒速剌遣使奉金葉表來朝貢其物有畨小厮犀角象牙玳瑁瑪瑙鸚鵡黑猿黑熊白麂鎖袱金毋鶴頂珍珠珊瑚撒哈剌白苾布薑黃布撒都細布西洋布片腦梔子花薔薇露沉香乳香速香金銀吉降真香檀香丁香烏木蘇木大楓子畨錫畨鹽使回令於廣東布政司管待正統間復來朝貢海語卷上

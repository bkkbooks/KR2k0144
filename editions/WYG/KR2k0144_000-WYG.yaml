body:
  text: 海語地理類十外紀之屬提要臣等謹案海語三卷明黄衷撰衷字子和上海人𢎞治丙辰進士官至兵部右侍郎是書乃其晩年致政家居就海洋畨舶詢悉其山川風土裒録成編自序稱鐵橋病叟者其别號也廣東通志載是書作一卷此本實三卷分為四類曰風俗凡二目曰物産凡二十九目曰畏途凡五目曰物怪凡八目所述海中荒忽竒譎之狀極為詳備然皆出舟師舵卒所親見非山海經神異經等純搆虚詞誕幻不經者比每條下間附論斷詞致並髙簡時寓勸戒亦頗有可觀書中别有附註乃其族子學準増加原本所載今併存焉案明史滿剌加傳稱正嘉間為佛郎機所滅而此書則稱佛郎機破其國王退依陂隄里佛郎機整衆而去王乃復所云云與史稍有不同此書成於嘉靖初海賈所傳見聞較近似當不失其實是尤可訂史傳之異不僅博物之資矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:369e85bd2750449bcf8f0db1a562b277027e637023247e64c1076f8f04f6e6e8

body:
  text: 海語卷中明黃衷撰物産音寵人屬出於暹羅之崛巄短小精悍圓目而黃睛性絶專慤不識金帛木石如猿猱古樾蒙密者率數十巢蓋舉族所聚也語咿嚶不可辨山居夷獠每諳其性常馴擾以備驅使蒙以敝絮食以音鴉鮍音具夷言小醎魚可治痢病十顆粒即愈服之忌醋犯則絶腸矣飲以漓酒即躍然喜似謂得所主者舉族受役至死不避雖歷世不更他姓嘗役以採片腦鶴頂皆如期而獲其山多犀象主者利其齒角授以毒鏢挾以歸遇犀或象輒往刺之升木而匿犀或象怒且索毋得也移刻毒發而殪乃羣聚呌嘯若誇其捷者相戒聚以守經月犀象且腐所遺如牙如角齒則負以數角乃一肩之以輸其主遇奪他姓亦至死弗畀也舶人編竹為籠紆深其制置所必由之徑機而取之以獻於夷王王大愛玩酬以蘇合油至數千斤猶衣以番錦飼以嘉實置之爽塏以非其主終不附也然稍近煙火淚目即死鐵橋子曰豫觀有三善焉格犀若象以小制大近勇不安華構不甘嘉養近廉不遺舊主近忠吁若可為臣監矣乎象象嗜稼凡引類于田必次畝而食不亂蹂也未旬即數頃盡矣島夷以孤豚縳籠中懸諸深樹孤豚被縳喔喔不絶聲象聞而怖又引類而遁不敢近稼矣夫體巨而力强者物莫象若佛書言菩薩之力譬如龍象是匹龍也孤豚之聲乃怖而遁之島夷之術竒矣抑何所受耶噫世之屛目任耳而自致疑懼者獨象也乎哉象足骨直無屈曲處膽隨四時周流四腿鼻端有瓜可拾針耳後有穴薄如鼓皮一刺而斃認其子之皮則泣惟牙最貴重然亦不切於服食器用也番夷歲貢驛遞疲於供需明王謹嚴好尚此物置之無用之地惟以有齒焚身作吏戒耳海犀海犀間出海上類野兕而額鼻有角與陸犀同所遊止處水為分裂夜則淵面白光熒熒此其異也島夷以是候之然竟無獲者遂為希世之物矣舊說溫嶠燃犀照水神怪莫遁晉書溫嶠還武昌至牛渚磯水深不可測世云其下多怪物嶠遂燬犀角而照之須臾見水族覆火竒形異狀或乘馬車著赤衣者嶠其夜夢入謂己曰與君幽明道别何意相照也意甚惡之後以齒疾終即其角也錢吳寶庫有水犀帶一具國亡流落人間不知所終云又野犀有名通天者角表夜光如炬亦竒物也夷堅續志凡犀角遇山川日月草木隨寓成影月與魚等皆是常有獨宋韓魏公犀帶中央一片乃鹿銜花已是絶竒宋孝宗居德壽宫光宗上壽以萬緍賂海商得犀角一片是南極老人星像所扶杖稍短類泣杖或以為不祥之物遂却之今具星像者絶不可見鹿銜花則貴家間有之又廣州志犀角有烏犀花犀通天犀復通犀花犀者白地黑花通天犀黑地白花復通犀則通天犀白花中復有黑花此皆希世之寶也考之宋仁宗以通天犀帶賜冦萊公萊公竟待以瞑日不為不重矣其辟寒犀駭雞犀則傳聞亦罕開元天寶遺事開元二年冬至交趾國進犀一株色黃如金使者請以金盤置於殿中溫溫然有暖氣襲人上問其故使者曰此辟寒犀也上甚悅厚賜之海馬海馬色赤黃髙者八九尺逸如飛龍山食而宅海蓋龍種也東南島夷老於泛海者間一見云昔人有巨獸骨者以問沙門贊寧贊寧宋初僧為寺主太祖至寺行香問曰朕見佛拜是不拜是曰見在佛不拜過去佛大合帝意遂為定禮贊寧曰是為海馬骨水火俱不能毁惟漚以糟腐即爛矣試之果然前代緇流博雅乃爾則名為大儒者其可及哉外一種海藥亦名海馬異物志云生西海大小如守宫蟲形似馬以豫所見乃石形似馬者竊恐初為生物遇泥沙衝漬久漸成石如石蟹本生蟹所成耳以海馬有二名故著之海驢海驢多出東海狀如驢舶估有得其皮者毛長二寸許睛則毿毿下垂隂則㲠䋱整也或以制卧裀善人御之竟夕安寢不善人枕籍魂乃數驚矣島夷詫其靈不敢蓄也鐵橋子曰獬豸觸邪獬豸神獸能觸邪今以為法司服色取此義神草指佞即屈軼草生堯時皆出於聖人之世蓋希代之瑞也海驢産於荒裔洪濤之中而其遺革猶辨淑慝以效其靈如其非誕亦足異矣吁孰謂靈具五常而智反敝革下邪海狗海狗純黃形如狗大乃如猫嘗羣遊背風沙中遙見船行則沒海漁以技獲之蓋利其腎也方書或謂駭狗腎謂以此物置之卧犬之側則驚駭而奔醫工以為即腽肭臍云按本草腽肭出西戎豕首魚尾而二足圖經云黃毛三莖一竅别種也獴獴或作俱有白有黑有黃有狸狀酷類猫而大亦髙足而結尾捕鼠捷於猫也諸國皆産惟暹羅者良舶佑挾至廣州常猫見而避之豪家每十金易一云海鼠海鼠大如豕重亦百斤目正赤然猶畏猫或獻於夷猶畜之别囿遇獴嚙其目死焉海鮎魚每涉沙際佯不動海鼠以為彼失水且死嚙其尾鮎轉首嘬之從水云海鷗海鷗似鵝而大不識人舶過嘗集人肩頂人輒捕而烹之列子海上之人有好鷗鳥者每旦從鷗遊至者百數其父曰取來吾玩明日之海上鷗舞而不下此似寓言之意也又晉書張華傳人有得巨鳥毛長三丈者問之華華愀然曰此海鳧毛也出則世將亂豫以鷗鳬類近附之海雞海雞毛色如家雞惟雙足鱉類爾海濵居民雞栖于野每與異種交接伏雛多有異狀者海鶴海鶴大者修項五尺許趐足稱是吞常鳥如餤魚鱔成化間有至漳州者漳人射殺之復有以頂貨者類淘河而鋭咮淘河即鵜鶘亦名逃河詩云維鵜在梁不濡其咮是也雄大雌乃略小晝啄于海暮宿巖谷間島夷豫以小鏢付月夕則伏於鶴常宿所擇其大者而刺之平旦有獲五六頭者島夷乃剝其頂售于舶估比至閩廣價等金玉豫嘗見廣中善宦有以鶴頂製飲器數百事海鶴頂亦可製帶真者極貴重但僞售者多甚難辨耳記云海上之鶴千歲為𤣥或云鶴有𤣥黃白蒼不等而白者最良堪入藥穆天子傳云天子至巨搜二氏獻白鶴之血以飲天子注云血益人氣力蓋不特可充玩好而已首飾金寶餉諸貴璫朝右以希顯柄然卒止方嶽豈數然邪抑公道可慿邪海鸚哥海鸚哥黑啄羽足亦鱉也若禽類則亦有真鸚鵡具五色者聞以充貢海燕海燕大如鳩春回巢於古巖危壁葺壘乃白海菜也島夷伺其秋去以修竿接鏟取而鬻之謂之海燕窩隨舶至廣貴家宴品珍之其價翔矣海旁俱沙磧無淤泥海菜脂瑩軟膩燕以營巢綢繆日久味加於本菜洗濯時尚有燕毛粘著其上也火雞山鳯火雞出滿刺加山谷大如鸛多紫赤色能食火澤州英雞能食碎石子西夷駝鳥能食生鐵物性之異如此吐氣亦煙焰也凡雞類多能吐氣記云錦雞吐綬豫於友人家親見之五彩成雲爛然可愛漸收入口矣子如鵝胎殼厚踰重錢或班或白島夷採為飲盞見者多珍竒之山鳯喙首如鶴頂足率七八尺趐翮過之能吞衆鳥敵人而啄其腦若刀斧然子大如椰甌豫嘗怪雜記漢時貢續絃膏云外國煎鳯髓所造又云諸天國食鳯卵如土人食雞卵按鳯靈鳥也應期而生傳稱翔於千仞覽德輝而下之夫見且不得而其髓與卵乃充日用理亦希矣豫意必有物如山鳯者之類耳賈誼賦曰使麒麟可係而羈兮何異於犬羊豫亦曰使鳯凰可烹而糜兮夫何異於雞鶩近時暹羅哪噠挾一以餉盤檢悅之倩巧匠裁為酤瓴市井誇謂僅見也夫明王之世不貴異物而杜淫巧此何為哉海鯊鯊有二種魚鱺之鯊蓋閩廣江漢之常産海鯊虎頭鯊體黑紋鱉足巨者餘二百斤嘗以春晦陟於海山之麓旬日而化為虎惟四足難化經月乃化矣或曰虎紋直疏且長者鯊化也炳炳成章者常虎也本草云沙魚出南海形如鱉無足而有尾山海經云可以飾劒廣中亦有沙魚其皮可以磨器及作劒室如叔所記當為别種傳云魚虎背有刺皮如猬頭如虎生南海亦有變為虎者此疑同類異名但不云有足草木子曰鱗蟲皆卵生獨海鯊胎生故為魚也最巨海龜海龜鷹首鷹吻大者方徑丈餘春夏之交遊卵於沙際島夷遇而捕之輒垂淚歔氣如人遭困厄然或諭之曰汝再垂淚歔氣當解汝縳龜便應聲潜然鳴若哀牛島夷舁至海濵釋之龜比入水引頸三躍若感謝狀而逝晉書毛寶傳寶在武昌軍人冇於市買得一白龜長四五寸養之漸大放諸江中邾城之敗養龜人被鎧持矛自投於水中如覺墮一石上視之乃先所養白龜長五六尺送至東岸遂得免焉富春志孫權時永康樵人入山得大龜名元緒將獻之吳王夜泊舟於越石里桑木下中夜聞木呼曰勞乎元緒何事乃爾龜曰遊不擇時為人拘繫木曰將就烹耶龜曰雖盡南山之木不能爛我木曰諸葛元遜博物之士也爾至則禍必至我王既得龜烹之積薪萬束莫能爛諸葛元遜果入曰宜用老桑木煮之樵人因言越石所聞之語王伐木煮之立爛云江湖紀聞景定癸亥荆門軍黃叔子處京學病函報其子未至十數里宿田舍繼有扣門報宿者與黃各通姓名談論古今亹亹可聽因問黃來故曰尊君得非黃叔子乎黃曰然何故相識其人曰豫死尊君實生之近聞其病乃多食生魚胸中積冷誤服凉藥今但服姜附湯可愈今既相遇豫可無行言訖不見黃到京乃知其父因上膈熱多服凉藥與冷積相併遂收效姜附焉叔子平生未嘗活人但同齊曽獲一龜將脫其殼黃憐而縱之意此報也又夷堅續志楊安撫炎正與其弟夢信皆以世科官至安撫家蓄一龜大二尺餘作龜室于堂奧每日餉以飯或餅餌之屬二揚偶有除擢或冇他喜則跳躍而出若有凶事則出而淚下夫載籍所記龜者多矣即此數事其性之超誤特為敻絶蓋非獨海龜為然也記曰麟鳯龜龍謂之四靈又曰守以靈龜是故龜不物矣海鰉鰉有二種常鰉類鰣魚而小河海皆産也海鰉身首差短歲二八月羣至數百騰於沙嶼移時化為鳥俗呼火鳩是也海濵居民候其上也譟而驚之化者才十五鱗鬛全不開者不全化矣居人羞者市者瀕海皆足余少時嘗見廣海人有以糟鰉餉先大夫者比發瓿鳥首而魚身者二先大夫愀然不懌曰是欲化而不可得者也無乃人離造化之情邪尚忍食哉命覆之即所謂鷹化為鳩雀入大水為蛤者也大抵造物變化無窮厯不盡載矣晉書張華傳武庫雉雊旁有蛇蛻宋楊文公談苑都下盛賣鶉是月絶無蛙聲凡此類也惟段成式所記補闕張周見壁上瓜子化為白魚徐聞司訓陳君嘗為豫言見一榕葉墜地轉動不已拾之半化為蜻蜓此頗為異耳其餘古今所受不可殫述矣雖然極其變而觀之滄海尚亦為桑田六合人物終盡而更始天地且不能違而瑣瑣者又何煩叙論乎海鰌海鰌長者亘百餘里牡蠣聚族其背曠歲之積崇十許丈鰌負以遊鰌背平水即牡蠣峍屼水面如山矣舶猝遇之如當其首輒震以銃炮鰌驚徐徐而沒猶漩渦數里舶顛頓久之乃定人始有更生之賀蓋觀甚竒而災甚切也瓊州舊志趙公簡公鼎謫吉陽軍即今崕州雷州守臣走使泛海通問使者晨望極逺處隱隱如十里紅旗出沒疑為番冦指示舟子舟子搖手戒勿語乃披髮持刀割舌血滴水中食頃方不見問之曰此海鰌也無數紅旗者背趐耳此舟幾為所壞裂乃舉酒相慶吁水物之害冇如是乎披髮裂舌蓋厭禳之志云此魚長或千里鰻鱺鰻鱺大者身徑如磨盤長丈六七尺鎗嘴鋸齒遇人輒鬭數十為隊常隨盛潮陟山而草食所經之路漸如溝澗夜則鹹涎發光舶人以是知為鰻鱺所集也燃灰厚布所開路執鏢㦸諸器羣譟而前鰻鱺循路而遞遇灰體澀不可竄移時乃困舶人恣殺之皮厚近食之美於肉也圖經云鰻鱺似蟬是蛟蜃之類海鰻最大豫嘗見釣獲者形甚可怪亦堪入藥如稽神録所載活癆疾婦人功用非小猶不及歙州五色者為上品耳印魚印魚出南海中似青魚而修廣過之頭骨中折如解顱之嬰腦後垂皮方徑三寸許若道巾之披餘然上有黑文儼如篆籀島夷間有獲者必珍藏之不知其何謂也河豚河豚出於江河者皆不盈尺海中大者如豕服雜紅黃文彩可玩常魚率水而遊此則旋回戲躍噴沫之聲烏烏如訓狐服鳥也似鶴賈誼在長沙作服賦狐或作胡服或作鵩舶人聞其聲知其下有河豚也以小絙繫義鏢擲而獲之有重數十斤者云此河豚背有紅黃圈文腹脹者烹飪失節能殺人梅聖俞時所謂入口生鏌鎁者也其江豚如豕形隨水上下鼻中有聲能噴水舟人以占風雨今揚子江多有之許渾詩所謂江豚吹浪夜還風是也海亦多此種其刑更大味如水牛而腥本草謂為江㹠海㹠即此也蜘蛛海蜘蛛巨若丈二車輪文具五色非大山深谷不伏也遊絲隘中牢若絙纜晨輝照耀光焰燁如虎豹䴢鹿間觸其網蜘蛛益吐絲如縞霞纒紏卒不可脫俟其斃腐乃就食之舶人欲樵蘇者率百十其徒束炬而往遇絲輒燃紅遍山谷如設庭燎蛛潜愈邃密惟恐其及也或云取其皮為履不航而涉豈其然歟陶隱居云蜘蛛有數十種今觀爾雅所載七八種耳皆無所謂海內俱有之但不及海外為極大耳世稱蜘蛛善巧埤雅曰知誅義者也然則海蜘蛛其專大巧而竊物權者乎猛火油猛火油樹津也一名泥油出佛打泥國大類樟腦苐能腐人肌肉燃置水中光焰愈熾蠻夷以制火器其烽甚烈帆檣樓櫓連延不止雖魚鱉遇者無不燋爍也一云出髙麗之東盛夏日初出時烘日極熱則液出他物遇之即為火此未必然恐出樹津者是也酴醿露酴醿海國所産為盛出大西洋國者花如中州之牡丹蠻中遇天氣凄寒零露凝結著他草木乃氷澌木稼殊無香韻惟酴醿花上瓊瑶晶瑩芬芳襲人若甘露焉夷女以澤體髮膩香經月不滅國人貯以鉛瓶行販他國暹羅尤特愛重競買略不論直隨船至廣價亦騰貴大抵用資香奩之飾耳五代時與猛火油俱充貢謂薔薇水云晉書賈謐傳外國貢異香著人則經月不歇武帝甚貴之惟以賜侍中賈充及大司農陳騫海外諸香木雖芬烈然不甚著人亦不經久據所云知即此香也片腦片腦産暹羅諸國惟佛打泥者為上其樹髙者三二丈葉如槐而小皮理類沙柳腦則其皮間凝液也好生窮谷島夷以鋸付就谷中尺斷而出剝而採之有大如指厚如二青錢者香味清烈瑩潔可愛謂之梅花片鬻至中國擅翔價焉復有數種亦堪入藥乃其次耳按本草有龍腦醫家專云片腦皆以為眼科之藥蓋即一也圖經云龍腦香出婆律國今惟南海番舶賈客貨之相傳云其木髙七八丈大可六七圍如積年杉木狀旁生枝葉正圓而背白結實如豆䓻酉陽雜俎云此木有肥瘦者出龍腦香其香在木心波斯斷其木剪取之肥者出婆律膏其膏於木端流出斫木作坎而承之或云南海山中亦冇此木唐天寶中交趾貢龍腦皆如蟬蠶之形此老木中根節方冇之極為難得也今海南龍腦多用火煏成片中亦有雜僞入藥惟貴生者狀若梅花瓣甚佳也詳觀所記與圖經大同小異雖出之處不同意海外之國俱有之總則謂之龍腦其成片如梅花者則謂片腦耳石蜜九海山巖穴野蜂窠焉釀實無收採者草間石鏬在在泛溢拋露日久必宿蛇虺之毒船人遭難入山者雖草木魚蟹之屬糝以胡椒熟而食之無害也脫遇石蜜以為甘而過食必大霍亂而死可不慎諸桐鄉摘集海外四月檳榔花盛開蜂採之率多醉死惟此時少衰餘月皆盛豫竊祿朱崕百況俱惡惟海味與石蜜得飽啖耳石蜜即巖蜜蘇恭以為非者誤也方書云遠方山郡幽僻處出蜜所著巉巖石壁非攀緣所及惟於山頂藍輿自懸掛下遂得採取蜂去餘蜜著石鳥雀羣飛來啄之盡至春蜂歸如故海上山巖萬岫四時和暖百花盛開故蜂蜜勝於他境自入楚以來所啖密味作微酸蜂多類木虻耳禹錫以蘇恭荆襄人地無巖險應未博聞是矣伽南香香品雜出海上諸山蓋香木枝柯竅露者木立死而本存者氣性皆溫故為大蟻所穴蟻食石蜜歸而遺於香中歲久漸漬木受蜜氣結而堅潤則香成矣其香本未死蜜氣復老者謂之生結上也木死本存蜜氣凝於枯根潤若餳片謂之糖結次也其稱虎班結金絲結者歲月既淺木蜜之氣尚未融化木性多而香味少斯為下耳諸香惟此種不堪入藥故本草不録廣州志云沉香有黃沉黑至貴者蠟沉削之則卷嚼之則柔皆樹枯其根所結伽南木乃沉之生結者大抵諸香無異種但分生死結久近粗細耳如青桂香馬啼香棧香速香之類各有次第而伽南為上沉次之餘再次之丁謂在海南作天香傳謂四十二狀同出一本盡之矣夫沉附種子伽南而亞之沉既入藥伽南乃參置不録何耶竊恐名謂既殊氣味功效亦當稍别不然本草其真蔽賢哉近世士夫以制帶銙率多凑合若天成純全者難得耳辟珠辟珠大者如指頂次如善提子次如黍粟質理堅重如貝辟銅鐵者銅鐵不能損辟竹木者竹木不能損犯似他物即毁矣常附胎於椰子檳榔果穀之實之內通謂之聖鐵一名㽔賔鐵人有善鼓琴於月夜者鐵自池荷中躍出其前名為聖鐵無忝也島夷能辨之故以為竒寶也夫威喜辟兵威喜未詳嘗記小說云昔一人藏物於身兵刃所施物自應之纎毫不損恐或指此舍利拒火僧有舍利云血氣精華之所凝結大化之後炳然獨存天竺沙門僧康會對孫權曰舍利威神豈有光相而已此乃劫燒之火所不能焚金剛之杵所不能碎而此珠出於草木乃能制犀利之物無亦庶類精華之所融結邪然皆中國未之或見也所謂鍾於物而不鍾於人者兹亦一佐邪蓬薘奈蓬薘奈華言破肚子蓋果實也産於暹羅之巄如大棗而青島夷日乾以附遠漬以沸汁其皮自脫圓脫如大李肉潤膩如紅酥甘美可餤亦珍味云南方草木狀所載廣南果食精美偹矣海外所傳如波羅蜜石栗海梧海松子蓬薘奈雖稱珍竒要之皆在枝圓橘柚之下惟海松子入藥近奉㫖求之極難得頗為纍耳波羅蜜按隋書四夷傳百濟有異樹名波羅波酉陽雜俎唐段成式著異木篇云婆羅婆樹其實大如甕又云出波斯國呼為阿善嚲樹長五六丈皮色青絲葉極光净冬夏不凋無花結實從樹莖出有殼裹之殼上有刺瓤至甘甜可食核大如棗一殼裹中有數百枚核味如栗炒黃食甚美豫至崕州凡家園皆有之味甜而頗腥氣不甚可口仁頗甘不如栗名獨盛矣石栗樹與栗同但生於山石罅中花開三年方結實其殼厚而肉少其味似胡桃仁熟時或為羣鸚鵡至啄食略盡故彼人極珍貴之出安南海梧子樹似梧桐色白葉似青桐有子如大栗肥甘可食出林邑海松子與中國松同但結實絶大形如小栗三角肥甘香美出林邑新羅海語卷中

body:
  text: 海語卷下明黄衷撰畏途崐山山在大佛靈南凡七嶼七港是謂七門唐書廣州東南海行三百里至屯門山或疑即此山計之道里不同恐非也其旁洲嶼皆翼然環列適諸國者此其標也其山多兕犀野馬巨麕異蛇大木復平川沃壤數百頃椰樹駢生墮實彌谷冬𤓰延蔓蒼藤徑寸實長三四尺大踰一圍海上無人之境産物皆碩大予客朱崖令人採取何首烏天南星二藥皆三倍於常品氣味自别周知有棗如𤓰非誕語也糜腐若泥淖然舶欲樵蘇非百人不敢即往老估嘗鑱崖壁識嶮以示防云分水分水在占城之外羅海中沙嶼隱隱如門限延綿横亘不知其幾百里巨浪拍天異於常海由馬鞍山扺舊港東注為諸畨之路西注為朱崖即今瓊州府所屬大約緫稱朱崖儋耳即今儋州之路天地設險以域華夷者也予嘗循朱崖儋耳之境緃觀于海則見洪濤駭浪勢如沸鼎色類藍靛遥望不極問于居民此外當為何所笑而不荅嘗聞崖州老客云毎取魚逺出界夜半畧聞鷄聲此為占城國而島夷志又聞占城至崖州七日程盖海直抵天際朱崖與諸畨皆在海中如浮巵然地理圖所載是也惟朱崖聨屬雷亷漢賈捐之建議棄之歴代皆入版圖聲名文物盖十倍交趾者也由外羅歴大佛靈以至崐山自朔至望潮東旋而西既望至晦即西旋而東此又海中潮汐之變也惟老於操舟者乃能察而慎之予㓜為弟子員時督學四明余子華老先生講正䝉及潮汐以余忠襄海潮圖為是盖主月之所臨潮必從之之説及逰朱崖讀王桐郷樀集又以長短星為驗再檢嶺外録云江浙之潮自冇定候欽亷之潮則朔望大瓊海之之潮半月東流半月西流潮之大小随長短星不係月盛衰始知王之説盖祖此萬里石塘萬里石塘在鳥瀦二洋之東隂風晦景不類人世其産多􅟴璖蛤蚌之屬海南人以鋸解之磨礱為硯極可珍玩本草以為玉石類者非也其鳥多鬼車九首者四三首者鬼車晦㝠則飛鳴能入人室收人魂魄一名鬼鳥此鳥昔有十首一首為犬所噬今猶餘九首其一常下血滴人家則凶夜聞其飛鳴則捩狗耳猶言其畏狗也亦名九頭鳥荆楚歲時記聞姑獲夜鳴聞則捩狗二鳥相似故有此同周禮庭氏以救日之弓救月之矢射之是也漫散海際悲號之音聒聒聞數里雖愚夫悍卒靡不慘顔沾襟者舵師脱小失勢誤落石汊數百軀皆鬼録矣萬里長沙萬里長沙在萬里石塘東南即西南夷之流沙河也弱水出其南風沙獵獵晴日望之如盛雪舶誤衝其際即膠不可脱必幸東南風勁乃免陷溺鐡板沙成化二十一年乙巳憲廟遣給事中林榮行人黄乾亨備封冊之禮以如占城官治大舶一艘凡大舶之行用小艚船一選熟於洋道者數十人駕而前謂之頭領大舶之後繫二小船以便樵汲且以防虞謂之快馬亦謂脚艇是役也軍民之在行者千人物貨太重而火長又昧於經路次交趾之占壁囉誤觸鐡板沙舶壞二使溺焉軍民死者十九予里中有麥福者同七十餘人奪一脚艇棹至崖側巨浪簸蕩衆懼捨舟而登山回望大舶覆處近如席前洪濤瀾汗惟敗篋破甑出没于其間數百人者漚滅無跡衆皆長慟於是晝行夜伏捕蛇䑕拾草木之實而啖風雨晦㝠石妖木魅千竒萬怪來侮來狎悉難名狀且已忘甲子惟視月弦望以驗時日曽未浹旬死者强半存者二十四人復已缺食二日蹣跚㝠行倀入空谷谷中石窟寛坦如堂有草葉如廣之水蕉掘之根類蹲䲭而大競取以食喉間㣲覺苦澁餘味如葛識者曰此非悪草也第未經風日水土氣作苦澁味耳乃曝之日中衆亦偃息石窟已皆酣寢比寤曉星煌煌矣遲明敲火燃草取所曝日中者煨而食之味轉香滑晨進一枚饑渇俱弭相率肆力而採頃之根裔都盡窟居二日體力完健乃各負數枚復沿水際而行俄聞谿中人語至見島夷數軰乗三小船循谿搜撈段帛諸物有諳夷語者詢之乃交趾占城二國之交徼廵船也二船酋長聞是覆溺之餘為之隱惻各取十二人共載以歸二國夷王謂天朝人民館榖如禮於是占城遣人以二使來訃廣中始知大舶汩没守臣以聞二使均荷恤䕃二使以死勤事聞其孫子甲科世盛朱紫相襲天之右功不為踈矣予薦主紹興毛鳴崗老先生題其家輓冊有白骨已沉恩似海錦衣可奈夜如年之句又踰年二國始具海舟資送諸人以還盖同日逹廣也逆計阽危之日至是已二年矣麥福自言向在占城旅次月夕夣還其家見三道士設水陸醮聞其妻哭聲而寤福於枕上亦哭同寢詰之語之夣無不酸鼻者次年抵家見其妻髽而麻衣筵几儼然夫婦相持悲喜交集詢其妻云凶問至時為丙午六月晦初猶未信既而審然七月望始倩道流招魂而葬月夕之夣無乃是乎吁人之逰魂夕數千里不既神乎鐡橋子曰甚哉利之戕賊也窮荒絶徼無不競焉二使銜命逺適異域不幸而溺厥職固在諸衆人者何為者哉縁刀錐之末蹈不測之淵以飽鯨鱷非溺海也利溺焉耳予故紀之以為犯險侔利者鍳之予竊禄海外每見叔此語輙愧恨不已携家生還不為不幸也大扺海舟深底入水數尺縱風浪洶湧舟極顛沛可保無恙惟遇沙淺并石浪勢相撞則破壞必矣嘉靖丁酉瓊府諸生下第者自省由海而歸至碙州而下失道遇淺數舟皆折崖州所溺凢八生焉次年予適至崖為之隕涕作哀八生文文拙且冗不復録也其稱狀類蹲䲭者不知其為何草也俾托根於通都名嶠得岐黄為之品第功豈下於重樓三秀者哉兹乃淪没裔夷廣莫之野獲濟者僅二十四人才而不效嗚呼惜也雖然幽人空谷古盖有之物怪海和尚海和尚人首鼈身足差長而無甲舟行遇者率虞不利𢎞治初吾廣督學大僉淮陽韋彦質先生將視學瓊州陸至徐聞方登海舟此物升鷁首而蹲舉舟皆泣謂有魚腹之憂議將禳之先生方嚴人不敢白也詰旦抵瓊留十許日試士都畢泛海而還若履平地後遷福建憲都考終于家語曰妖不勝徳草木子邵子曰陸生之物水中必具計必有海人嘗聞之海賈云有海人出形如僧人頗小登舟而坐至則戒舟人寂然不動少頃復沉水否則大風翻舟以予觀之必水族之異形者也遇物而升值之恐非禍福所係率以為怪是謂生於罕乎海神風柔浪恬島嶼晴媚倐然紅旗整整擁浪而馳迅若徼電火長即焚香長跪率衆而拜曰此海神逰也整整紅旗者夜义隊也遇者吉矣南海最靈驗勅賜廟宇春秋二祭國有大事天子為遣使進香廟舊有波羅樹一本海中大暨魚一歲間歲來朝民間舟中所事海神不一廣瓊有天妃祠亦受勅封王祭昌化有峻靈王祠蘇子膽謫海南為作碑記餘不盡録予携家浮海還横巨浪幾不能濟舟人呼神而共禱之頃刻順風入港矣鬼舶海舶相遇火長必舉火以相物色日影向西或三或兩帆檣樓舵首尾間缺下上欹側掠浪衝突此舉火而彼不應者知鬼舶也巫乃披髪擲米抛紙而厭勝之游魂為變則覆溺亡者似為鬼矣所操之舶果何所化耶未可知也飛頭蠻飛頭蠻亦海山中鬼物也居處嗜好與人無别夜則其首飛去頥實穢物歸則身首屬而嚥之惟頷下㣲痕紅線耳暹羅島夷有娶婦得此者其夫惡之或教以俟其首去置身于地以小刀喇喉頸間頃之首歸不合宛轉而死夷僧云是必素遺誓約鬼罰乃爾然予偶記小説云某人家生一子自然無首則飛頭者豈亦沴氣適然所鍾邪予僚友嘗言海外竒事鄉間有納婦者婦每夜從牀前入地去飽食魚蠏而返衣猶沾濕其夫欲逐之不果後生子如常亦無他異此與予叔所記皆令人駭不置信者鄉伯祭酒泰泉黄公志云親見香山縣深林中有物如嬰孩而躶自藤蘿中携手魚貫而下相挽不㫁見人輙笑至地而滅土人謂之赤蝦亦無所怖及閲雙槐集所載亦與此合又鹽商髙氏言代薪青逺縣山中見一小孩奔走衆逐入枯樹中以火熨之出走死視之儼如人形惟脇下多兩趐耳二縣廣州屬邑已希異如此是知六合之中無所不有而海外神怪為多故曰視聽之表聖賢有不言者也人魚人魚長四尺許體髪牝牡人也惟背有短鬛㣲紅耳間出沙汭亦能媚人舶行遇者必作法禳厭惡其為祟故也昔人有使髙麗者偶泊一港適見婦人仰卧水際顱髪蓬短手足蠕動使者識之謂左右曰此人魚也山海經姑射國在海中屬列姑射西南有陵魚人靣手足魚身在海中慎毋傷之今以楫扶置水中噀波而逝蛇異𢎞治間有舶欲販於占城者舶中二十人將即山而薪是夜舶主夣神語之曰明日斫山湏多裹鹽也寤而異焉以語諸薪者或笑或不信舶主曰第人負十許斤何礙衆從之乃乗二快馬即三山麓石潭深不可測二十人者分朋而攻日影西下山聲殷殷如雷衆謂天日髙晴何以有此是必有異升木而伺俄有巨蛇蜿蜒幾五丈其色正黒兩目如炬山巔奮迅而下没于潭如雷者乃觸石崩隕之聲也有蜈蚣長可七尺騰躍而逐之旋潭踥踥尾端毒沫時時射潭内水色變如油抵暮潭靣火燄髙尺許舶人熟視乃自蜈蚣甲間出夜分循山而去光燁燁燭山谷遲明下山觀之蛇踡跼死潭間衆方驚喜曰裹鹽之夣實神貺也乃以藤䌫聨巨鐡鈎引蛇出平野剥其皮厚如黄牛之革骨節中韲臼醃其肉殆滿船腹衆乃輟薪載蛇以回舶島夷之船或過而見其皮問何從得之為價幾何舶主紿曰五十金島夷付之不較復問肉價幾何曰百金又付之不較易載將發舶主謂島夷曰若何急此為也島夷笑曰漢兒不識寳耳是乃龍也其皮鞔鼓聲聞二十里龍皮亦可製扇開元天寳遺事元寳家有一皮扇子製作其質毎暑月宴客即以此扇子置於坐前使新水灑之則颯然風生廵酒之間客有寒色遂命撤去明皇亦曽差中使去取愛而不受帝曰此龍皮扇也此皮中七鼓一鼓即償今值易易也肉以為鮓貨于國中且不知值又幾倍矣舶主懊恨自謂其不善賈也鐡橋子曰物遇乃貴是何足歎哉語云螣或作騰蛇㳺霧而殆於即且或作蝍蛆見淮南子氣固有相制夫予村居時見小蜈蚣逐尺餘小蛇于池塘蛇懼没水蜈蚣于水靣布毒沫蛇不禁自浮出蜈蚣乃嚙殺之并去其両日郷人云蜈蚣寄種于蛇目是以毒也凢蜈蚣極大則有寳珠雷毎擊之或云惡其善傷龍也又沈存中篳談云見一蜘蛛逐蜈蚣蜈蚣循籬竹裂隙而入蜘蛛以腹磨隙再三而去少頃破竹視之則蜈蚣斷爛不屬矣盖蜘蛛布溺以殺之也物之以小制大理實運之耶龍變岡瀕海洲也環海皆崇山其氓多以樵採為業昔有樵者三十餘軰駕二白艚渉海而斮薪午將及岸遥望巨物青黒如蛇垂首山脊其角􅋾􅋾也諸衆人驚相召曰蚺蛇吞鹿矣蚺蛇長數丈大亦數圍善吞鹿惟角難進乃伏水中俟其將腐變登木自絞則角脱骨盡出矣楚詞辯證疑巴蛇食鹿出骨事似迂誕而蚺蛇已有然者膽入藥最良本草以為産於髙雷而海外尤盛彼利得鹿吾屬利得蚺耳棹歌踴躍而前維舟山麓以梃與刃譟而争先比至山半隂雲四合雷電大作雨雹石注樵者怖散莫知所之頃之天日開霽崩崖㧞木彌溢山谷樵人血額裂趾者纍纍而集顧見二白艚閣置樹杪攀木而升則雨電滿載惟米鹽衣被略無所損乃取米若釜為糜而食越數日别艚踵至衆乃得歸鐡橋子曰事固有似利而實害者樵也烏足以知之然鬼神戯人類是多矣此或龍運天變之期也瀕海居民毎直龍運則屋宇人畜頃刻半空無論舟楫也易曰龍戰于野鄒陽䟽曰神龍驤首奮翼則浮雲出流斯際也天地且易位人孰得而攖之深山大澤神物所居切不可觸犯續搜神記云昔有三人共在便山中伐木忽見石窠中有二卵大如升取煮之始湯熱聞林中如風雨聲須叟有一蛇大十圍長四五丈徑來於湯中啣卵去三人無幾皆死予嘗過昌化大村驛旁有神廟前土隆然或有動其土石者輙死人皆為廟神呵䕶之予聞登其上戒僮僕勿使犯意古有息壤或此類也石妖妖出崐山疑亦隂精也昔漳人有販舶者偕伴數十薪于山中崖間石壁可鑑漳人祖負石立俄有婦從石隙出姿態姝麗殊非蠻島所有漳人與語媚之迷惑忘返遂伉儷焉婦日獻草木實殊形異色味皆甘脆遂已饑渇乃𨗳漳人葺茅以居繞舍蒔美竹踰時即長林鬰鬰無復寒暑漳人時從婦陟巘求食毎遭猛獸鬼物婦身為蔽翼習見毋怪亦毋恐也婦又教之驗草木榮落以記時嵗漳人安之是生二子不自知其流落海嶼間也所閱草木凡五榮落婦或他出漳人獨居忽伐竹聲往視乃舶樵也中有舊侣二軰即鄉思油然向舶人道所以請共載以歸舊侣乃匿之舟中婦挾二雛追至沙溆侏􅍣之聲如怨如詈擲二雛於水號噭而去漳人登舶竟瘖不能語夷堅續志廣州有商人與同伴泛海往諸國經紀偶中流得病力别同伴登岸歇泊至一洲間結茅居止遂相與約云若回舟如見竹竿標記衣物可來相接若無標記即已不諱不必泊船恐阻風利也越半年舟經前地則竹竿衣物竝無矣衆相望欷歔暨回廣州訪其家人歴道其所以全家痛哭即命道士建九幽齋醮祭煉天下孤魂至夜三更召請之時忽聞屋上有人連呼曰我在此急用梯扶下乃所度之人未嘗死也即救以湯粥方省人事云昨浮海得病止于洲渚止忽有二婦人挾至山中石崖内每日亦有飯食但自不知此身為生死已近年餘一日聞二婦相語曰有符使持公文至水府稱廣州某人作商死於海島今祭煉天下鬼神宜留此人我爾自去赴㑹既宻聞之力扣二婦口望帯去一觀一婦曰不可一婦曰不妨遂挾至其建功徳所約曰今藏你在屋上戒勿作聲二婦遂往壇前享食適聞道士出門召請我名姓又是本家作醮主且曉我家人哭泣之聲是以呌呼二婦方知駡云始不欲帯彼來今事泄矣飛走而去其人歸雖得冄生但飲食甚少越兩月死盖為鬼氣所侵不可救藥但得終於正寢而已以此見祭煉之有功也又昔有富商漂海舟折抱一板至岸得熊毋挽之而上登石竅甚深窈其中以草芥毛羽為巢頗温暖菓木具設商安焉與熊合而生子後有賈舟經其下商抱子登舟有珠數顆極為珍美熊見商去亟縁崖而下攀附不可投水死商携子歸本姓之子不容遂養于别所長分以財帛俾店于公安而姓之曰熊今其遺種猶大似猴耳以上三事與所記相類故附著于後然揆之㑹通於理則窒讀者辨之海語卷下
